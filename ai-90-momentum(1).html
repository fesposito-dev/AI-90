<!-- AI-90 · Centro di comando personale di Francesco -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-90 · Francesco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F5F2;
    --ink:#0B0B0C;
    --blue:#1733FF;     /* electric blue — la tua identità */
    --blue-deep:#0E20B8;
    --gray:#A6A69E;
    --line:#1f1f22;
    --soft:#E7E7E2;
    --ok:#1733FF;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Inter","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.4;
    padding:0;
  }
  .wrap{max-width:1000px;margin:0 auto;padding:22px 20px 80px}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-0.02em}

  /* header */
  .top{display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:3px solid var(--ink);padding-bottom:12px;flex-wrap:wrap;gap:10px}
  .brand{font-weight:900;font-size:clamp(26px,6vw,40px);letter-spacing:-0.03em;line-height:0.95}
  .brand small{display:block;font-size:12px;font-weight:700;letter-spacing:0.18em;color:var(--blue);margin-top:6px}
  .daycount{text-align:right;font-weight:800}
  .daycount b{display:block;font-size:clamp(22px,5vw,34px);letter-spacing:-0.03em}
  .daycount span{font-size:10px;letter-spacing:0.18em;color:var(--gray);font-weight:700}

  /* hero grid */
  .hero{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-top:22px}
  @media(max-width:720px){.hero{grid-template-columns:1fr}}

  .today{border:2px solid var(--ink);padding:20px;background:#fff}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:0.2em;color:var(--gray)}
  .wk-title{font-weight:900;font-size:clamp(20px,4vw,26px);letter-spacing:-0.02em;margin:6px 0 2px}
  .wk-focus{font-size:14px;color:#333;margin-bottom:16px}
  .tasks{list-style:none;margin:0;padding:0}
  .tasks li{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--soft);cursor:pointer}
  .tasks li:first-child{border-top:none}
  .box{flex:0 0 22px;width:22px;height:22px;border:2px solid var(--ink);margin-top:1px;
    display:grid;place-items:center;transition:.12s;background:#fff}
  .box svg{width:13px;height:13px;opacity:0;transform:scale(.4);transition:.12s}
  .tasks li.done .box{background:var(--blue);border-color:var(--blue)}
  .tasks li.done .box svg{opacity:1;transform:scale(1)}
  .tasks li.done .t-text{color:var(--gray);text-decoration:line-through}
  .t-text{font-size:14px;font-weight:500}
  .ship-of-week{margin-top:14px;font-size:12px;border-top:2px dashed var(--ink);padding-top:12px}
  .ship-of-week b{color:var(--blue);letter-spacing:0.05em}

  /* streak panel */
  .streak{border:2px solid var(--ink);background:var(--ink);color:var(--paper);
    padding:20px;display:flex;flex-direction:column;justify-content:space-between}
  .streak .lab{font-size:11px;font-weight:800;letter-spacing:0.2em;color:var(--gray)}
  .streak .big{font-weight:900;font-size:clamp(72px,18vw,120px);line-height:0.82;letter-spacing:-0.04em;margin:4px 0}
  .streak .big.zero{color:var(--gray)}
  .streak .sub{font-size:12px;color:var(--gray);min-height:34px;font-weight:500}
  .fatto{margin-top:16px;border:none;background:var(--blue);color:#fff;font-family:inherit;
    font-weight:900;font-size:18px;letter-spacing:0.04em;padding:18px;cursor:pointer;width:100%;
    transition:.12s;text-transform:uppercase}
  .fatto:hover{background:#fff;color:var(--blue)}
  .fatto:disabled{background:#2a2a2e;color:var(--gray);cursor:default}
  .best{font-size:11px;color:var(--gray);margin-top:10px;letter-spacing:0.05em}

  /* chain grid (signature) */
  .section{margin-top:34px}
  .s-head{display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:14px}
  .s-head h2{margin:0;font-size:13px;font-weight:800;letter-spacing:0.2em}
  .s-head em{font-style:normal;font-size:12px;color:var(--gray)}
  .chain{display:grid;grid-template-columns:repeat(18,1fr);gap:5px}
  @media(max-width:720px){.chain{grid-template-columns:repeat(10,1fr)}}
  .cell{aspect-ratio:1;border:1.5px solid #d2d2cc;background:transparent}
  .cell.on{background:var(--blue);border-color:var(--blue)}
  .cell.next{border-color:var(--ink);border-width:2px;animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(23,51,255,.5)}50%{box-shadow:0 0 0 4px rgba(23,51,255,0)}}
  @media(prefers-reduced-motion:reduce){.cell.next{animation:none}}

  /* phases */
  .phases{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:720px){.phases{grid-template-columns:1fr}}
  .ph{border:2px solid var(--ink);padding:14px}
  .ph .pn{font-size:10px;letter-spacing:0.2em;color:var(--gray);font-weight:800}
  .ph .pt{font-weight:800;font-size:15px;margin:4px 0 10px;letter-spacing:-0.01em}
  .bar{height:8px;background:var(--soft);position:relative}
  .bar i{position:absolute;inset:0 auto 0 0;background:var(--blue);transition:width .4s}
  .ph .pct{font-size:11px;color:var(--gray);margin-top:6px;font-weight:600}

  /* map */
  .week{border:1px solid var(--ink);margin-bottom:8px;background:#fff}
  .week.cur{border-width:2px;border-color:var(--blue)}
  .week-h{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;cursor:pointer;gap:10px}
  .week-h .wl{font-weight:800;font-size:14px;letter-spacing:-0.01em}
  .week-h .wl span{color:var(--blue);font-weight:900;margin-right:8px}
  .week-h .meta{font-size:11px;color:var(--gray);font-weight:700;white-space:nowrap}
  .week-body{padding:0 15px 14px;display:none}
  .week.open .week-body{display:block}
  .week-body .focus{font-size:13px;color:#444;margin:0 0 10px}
  .week .ship-of-week{border-top:1px dashed var(--ink)}

  /* ships */
  .ship-add{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .ship-add input{flex:1;min-width:160px;border:2px solid var(--ink);padding:11px;font-family:inherit;font-size:14px;background:#fff}
  .ship-add input:focus{outline:3px solid var(--blue);outline-offset:1px}
  .ship-add button{border:2px solid var(--ink);background:var(--ink);color:#fff;font-family:inherit;
    font-weight:800;padding:0 18px;cursor:pointer;letter-spacing:0.05em}
  .ship-add button:hover{background:var(--blue);border-color:var(--blue)}
  .ship-item{border-left:4px solid var(--blue);padding:10px 14px;margin-bottom:8px;background:#fff;border-top:1px solid var(--soft)}
  .ship-item .sd{font-size:10px;color:var(--gray);letter-spacing:0.1em;font-weight:700}
  .ship-item .stext{font-weight:600;font-size:14px}
  .ship-item a{color:var(--blue);font-size:12px;font-weight:700;text-decoration:none}
  .empty{color:var(--gray);font-size:13px;font-style:italic}

  /* why */
  .why{border:3px solid var(--ink);padding:20px;background:var(--blue);color:#fff}
  .why .wl{font-size:11px;font-weight:800;letter-spacing:0.2em;opacity:.8}
  .why textarea{width:100%;background:transparent;border:none;color:#fff;font-family:inherit;
    font-weight:800;font-size:clamp(18px,3.4vw,24px);line-height:1.3;resize:none;margin-top:8px;letter-spacing:-0.01em}
  .why textarea:focus{outline:none}
  .why textarea::placeholder{color:rgba(255,255,255,.55)}

  .footnote{margin-top:30px;font-size:11px;color:var(--gray);text-align:center;letter-spacing:0.04em}

  /* confetti */
  #cf{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
  .conf{position:absolute;width:9px;height:14px;will-change:transform,opacity}
</style>

<div class="wrap" id="app" aria-busy="true">
  <div style="padding:60px 0;text-align:center;color:var(--gray)">Carico la tua catena…</div>
</div>
<div id="cf" aria-hidden="true"></div>

<script>
/* ---------- IL PIANO ---------- */
const PHASES = [
  {n:"FASE 1", t:"Fondamenta", weeks:[1,2,3,4]},
  {n:"FASE 2", t:"Come funziona un LLM", weeks:[5,6,7,8]},
  {n:"FASE 3", t:"AI Engineer", weeks:[9,10,11,12,13]},
];
const WEEKS = [
  {w:1,title:"Python (venendo da JS) + setup",focus:"Trasferisci JS→Python e prepara il campo. Niente teoria pesante, solo mani sulla tastiera.",
   tasks:["Installa Python + VS Code, crea il repo GitHub pubblico \u00abai-90\u00bb","Ripasso Python: differenze da JS (list comprehension, dict, f-string, venv/pip)","Fai 10 micro-esercizi (loop, funzioni, file)","Primo commit + README: scrivi PERCH\u00c9 lo stai facendo"],
   ship:"Repo pubblico \u00abai-90\u00bb online con README"},
  {w:2,title:"Intuizione: cos'\u00e8 una rete neurale",focus:"Serie 3Blue1Brown \u00abNeural Networks\u00bb. \u00c8 corta e bellissima — fatta apposta per non annoiarti.",
   tasks:["Guarda i 4 video di 3Blue1Brown (Neural Networks)","Appunti a mano: cos'\u00e8 un peso, un layer, la loss","Scrivi a parole TUE cos'\u00e8 il gradient descent","Pubblica una nota/post: \u00abrete neurale spiegata semplice\u00bb"],
   ship:"Post pubblico: la tua spiegazione semplice"},
  {w:3,title:"micrograd — parte 1 (Karpathy)",focus:"Costruisci un motore di backprop da zero. Una volta sola, e capisci cosa c'\u00e8 DENTRO il modello.",
   tasks:["Guarda i primi ~60 min di micrograd","Ricrea la classe Value da zero","Implementa backward per +, *, tanh","Commit del notebook su GitHub"],
   ship:"Notebook micrograd (parziale) su GitHub"},
  {w:4,title:"micrograd completo + MLP",focus:"Chiudi micrograd e allena la tua prima rete. Vedrai la loss scendere — quello \u00e8 il momento \u00abah, funziona\u00bb.",
   tasks:["Finisci il video micrograd","Costruisci e allena un MLP piccolo","Capisci il training loop (forward \u2192 loss \u2192 backward \u2192 step)","Pubblica il grafico della loss che scende"],
   ship:"micrograd completo + grafico della loss"},
  {w:5,title:"makemore 1\u20132 (bigram + MLP)",focus:"Un modello che genera testo carattere per carattere. Allenalo sui nomi.",
   tasks:["Guarda makemore parte 1 e 2","Ricostruisci il modello bigram","Passa all'MLP, genera nomi","Idea: allenalo su nomi/parole napoletane \ud83d\ude09"],
   ship:"Generatore di nomi (il tuo dataset)"},
  {w:6,title:"makemore 3\u20134 (attivazioni, batchnorm)",focus:"Le viscere: perch\u00e9 le reti profonde sono fragili e cosa le stabilizza.",
   tasks:["Guarda makemore parte 3 e 4","Capisci attivazioni morte e batchnorm","Backprop manuale (senza autograd) almeno una volta","Nota pubblica: \u00abcosa fa la batchnorm\u00bb"],
   ship:"Notebook + nota su batchnorm"},
  {w:7,title:"\u00abLet's build GPT\u00bb — parte 1",focus:"Qui costruisci un GPT da zero. Tokenizzazione e self-attention: il cuore di TUTTO oggi.",
   tasks:["Guarda la prima met\u00e0 di \u00abLet's build GPT\u00bb","Implementa tokenizzazione + embedding","Implementa la self-attention","Commit del progresso"],
   ship:"Progresso GPT pubblico"},
  {w:8,title:"GPT completo + allenalo",focus:"Chiudi il GPT e allenalo su testo tuo. \ud83d\udc49 CHECKPOINT: ti accende il PERCH\u00c9 (\u2192 Piano 2) o il COSA-CI-COSTRUISCO (\u2192 Piano 1)?",
   tasks:["Finisci nanoGPT","Allena il mini-GPT su un corpus italiano/tuo","Genera testo e divertiti coi risultati","DECIDI: cosa ti ha acceso di pi\u00f9?"],
   ship:"Mini-GPT che genera testo + il tuo verdetto Piano 1/2"},
  {w:9,title:"API a fondo + embeddings",focus:"Smetti di \u00abchiamare l'API\u00bb e inizia a capirla: structured output, function calling, embeddings.",
   tasks:["Chiama l'API sul serio: structured output + function calling","Capisci cosa sono gli embeddings","Genera embeddings di un set di documenti","Costruisci una ricerca \u00abper significato\u00bb"],
   ship:"Tool di ricerca semantica sui documenti"},
  {w:10,title:"RAG — il pattern n.1 in produzione",focus:"pgvector \u00e8 dentro Supabase: \u00e8 casa tua. Vantaggio enorme.",
   tasks:["Chunking dei documenti","Vector DB con pgvector su Supabase","Pipeline RAG completa su documenti veri","Deploy del Q&A su Vercel"],
   ship:"Q&A su documenti, deployato e usabile"},
  {w:11,title:"EVAL — la skill che ti manca davvero",focus:"Misurare se funziona = validare. Tu uccidi le idee perch\u00e9 non le validi mai. Questa settimana \u00e8 mezza tecnica e mezza terapia.",
   tasks:["Impara RAGAS / Promptfoo","Costruisci un eval set di ~30 esempi del tuo RAG","Misura faithfulness e relevance","Pubblica il report di eval del tuo sistema"],
   ship:"Report/dashboard di eval del tuo RAG"},
  {w:12,title:"Agenti + start capstone",focus:"Tool use e guardrail. E scegli il progetto cliente REALE su cui chiudere.",
   tasks:["Implementa tool use + un guardrail","Scegli il cliente: gestionale (40 dip.) o LeadPilot","Progetta la feature AI che i concorrenti NON sanno fare","Primo pezzo funzionante"],
   ship:"Spec capstone + primo pezzo live"},
  {w:13,title:"CAPSTONE — deploy + case study",focus:"Bolti l'AI dentro un prodotto cliente vero e lo DEPLOYI. Non puoi ucciderlo: c'\u00e8 un cliente dall'altra parte.",
   tasks:["Integra la feature AI nel progetto cliente","Deploy in produzione","Scrivi il case study","Post: \u00abho messo l'AI nel gestionale di un cliente da 40 dipendenti\u00bb"],
   ship:"Feature AI LIVE + case study pubblico"},
];
const TOTAL_TASKS = WEEKS.reduce((a,w)=>a+w.tasks.length,0);
const TARGET_DAYS = 90;
const PUSH = ["Jamme b\u00e8.","Mo' se fa.","60 minuti. Solo quelli.","Tieni \u2019a capa, vai.","Una cosa sola, ora.","Non spezzare la catena.","Apri l'editor e parti."];

/* ---------- STORAGE (localStorage — salva nel TUO browser) ---------- */
const KEY="ai90:state";
let S=null, mem=false;
const todayStr=()=>new Date().toISOString().slice(0,10);
const dayDiff=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);

function storageOK(){
  try{localStorage.setItem("__ai90t","1");localStorage.removeItem("__ai90t");return true;}
  catch(e){return false;}
}
function load(){
  try{const v=localStorage.getItem(KEY);if(v)return JSON.parse(v);}catch(e){}
  return null;
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(S));}
  catch(e){mem=true;}
}
function fresh(){
  return {start:todayStr(),logged:[],streak:0,best:0,done:{},ships:[],
    why:"Voglio vivere la vita dei miei sogni lavorando. Per quello sto qui."};
}

/* ---------- LOGICA ---------- */
function currentWeekIdx(){
  for(let i=0;i<WEEKS.length;i++){
    const w=WEEKS[i];
    const all=w.tasks.every((_,j)=>S.done[`w${w.w}-${j}`]);
    if(!all) return i;
  }
  return WEEKS.length-1;
}
function tasksDone(){ return Object.values(S.done).filter(Boolean).length; }

function logToday(){
  const t=todayStr();
  if(S.logged.includes(t)) return {already:true};
  let msg="";
  if(S.logged.length===0){ S.streak=1; }
  else{
    const gap=dayDiff(S.logged[S.logged.length-1],t);
    if(gap===1){ S.streak+=1; }
    else if(gap===2){ S.streak+=1; msg="Hai saltato ieri. La catena NON si rompe \u2014 \u00e8 questo il punto. Saltare \u2260 mollare. Jamme."; }
    else{ S.streak=1; msg="Vuoto di qualche giorno. La catena riparte da 1, e va bene cos\u00ec. Non \u00e8 un fallimento, \u00e8 un marted\u00ec. L'unico vero fallimento era non riaprire \u2014 e sei qui."; }
  }
  S.logged.push(t);
  S.best=Math.max(S.best,S.streak);
  return {already:false,msg};
}

/* ---------- RENDER ---------- */
function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild;}
const CHECK=`<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4"><path d="M4 12l5 5L20 6"/></svg>`;

function render(){
  const app=document.getElementById('app');
  app.setAttribute('aria-busy','false');
  const ci=currentWeekIdx();
  const cw=WEEKS[ci];
  const loggedToday=S.logged.includes(todayStr());
  const done=tasksDone();
  const pctAll=Math.round(done/TOTAL_TASKS*100);

  app.innerHTML="";

  // header
  app.appendChild(el(`
    <div class="top">
      <div class="brand">FRANCESCO<small>\u2192 AI ENGINEER &middot; 90 GIORNI</small></div>
      <div class="daycount num"><b>${S.logged.length} / ${TARGET_DAYS}</b><span>GIORNI FATTI &middot; ${pctAll}% DEL PIANO</span></div>
    </div>`));

  // hero
  const hero=el(`<div class="hero"></div>`);
  // today card
  const today=el(`<div class="today">
      <div class="eyebrow">OGGI &middot; SETTIMANA ${cw.w}</div>
      <div class="wk-title">${cw.title}</div>
      <div class="wk-focus">${cw.focus}</div>
      <ul class="tasks"></ul>
      <div class="ship-of-week"><b>SHIP DELLA SETTIMANA \u2192</b> ${cw.ship}</div>
    </div>`);
  const ul=today.querySelector('.tasks');
  cw.tasks.forEach((tk,j)=>{
    const id=`w${cw.w}-${j}`;
    const li=el(`<li class="${S.done[id]?'done':''}"><span class="box">${CHECK}</span><span class="t-text">${tk}</span></li>`);
    li.onclick=()=>{S.done[id]=!S.done[id];save();render();};
    ul.appendChild(li);
  });
  hero.appendChild(today);

  // streak
  const sub = loggedToday
    ? "Ci hai gi\u00e0 lavorato oggi. Riposa o vai avanti \u2014 ma la catena \u00e8 salva. \ud83d\udd35"
    : (S.streak>0 ? "Non lasciare un buco oggi. "+PUSH[Math.floor(Math.random()*PUSH.length)] : "Premi il bottone e accendi la catena.");
  const streak=el(`<div class="streak">
      <div>
        <div class="lab">GIORNI DI FILA</div>
        <div class="big num ${S.streak===0?'zero':''}">${S.streak}</div>
        <div class="sub" id="sub">${sub}</div>
      </div>
      <div>
        <button class="fatto" id="fatto" ${loggedToday?'disabled':''}>${loggedToday?'\u2713 Fatto oggi':'Fatto oggi'}</button>
        <div class="best num">Record: ${S.best} giorni${mem?' &middot; \u26a0 salvataggio non attivo':''}</div>
      </div>
    </div>`);
  streak.querySelector('#fatto').onclick=()=>{
    const r=logToday();
    if(r.already) return;
    save();
    burst();
    render();
    if(r.msg){ const s=document.getElementById('sub'); if(s) s.textContent=r.msg; }
  };
  hero.appendChild(streak);
  app.appendChild(hero);

  // chain
  const chainSec=el(`<div class="section">
      <div class="s-head"><h2>LA CATENA</h2><em>non lasciare buchi nel muro</em></div>
      <div class="chain" id="chain"></div>
    </div>`);
  const chain=chainSec.querySelector('#chain');
  const filled=S.logged.length;
  for(let i=0;i<TARGET_DAYS;i++){
    let cls="cell";
    if(i<filled) cls+=" on";
    else if(i===filled && !loggedToday) cls+=" next";
    chain.appendChild(el(`<div class="${cls}"></div>`));
  }
  app.appendChild(chainSec);

  // phases
  const phSec=el(`<div class="section">
      <div class="s-head"><h2>LE TRE FASI</h2><em>capire \u2192 costruire \u2192 vendere</em></div>
      <div class="phases" id="phases"></div>
    </div>`);
  const ph=phSec.querySelector('#phases');
  PHASES.forEach(p=>{
    let t=0,d=0;
    p.weeks.forEach(wn=>{const w=WEEKS[wn-1];t+=w.tasks.length;w.tasks.forEach((_,j)=>{if(S.done[`w${w.w}-${j}`])d++;});});
    const pct=Math.round(d/t*100);
    ph.appendChild(el(`<div class="ph"><div class="pn">${p.n}</div><div class="pt">${p.t}</div>
      <div class="bar"><i style="width:${pct}%"></i></div><div class="pct num">${pct}% &middot; sett. ${p.weeks[0]}\u2013${p.weeks[p.weeks.length-1]}</div></div>`));
  });
  app.appendChild(phSec);

  // map
  const mapSec=el(`<div class="section">
      <div class="s-head"><h2>LA MAPPA &middot; 13 SETTIMANE</h2><em>tocca per aprire</em></div>
      <div id="map"></div>
    </div>`);
  const map=mapSec.querySelector('#map');
  WEEKS.forEach((w,i)=>{
    const d=w.tasks.filter((_,j)=>S.done[`w${w.w}-${j}`]).length;
    const wk=el(`<div class="week ${i===ci?'cur':''} ${i===ci?'open':''}">
        <div class="week-h"><div class="wl"><span class="num">${String(w.w).padStart(2,'0')}</span>${w.title}</div>
          <div class="meta num">${d}/${w.tasks.length}</div></div>
        <div class="week-body"><p class="focus">${w.focus}</p><ul class="tasks"></ul>
          <div class="ship-of-week"><b>SHIP \u2192</b> ${w.ship}</div></div>
      </div>`);
    wk.querySelector('.week-h').onclick=()=>wk.classList.toggle('open');
    const wul=wk.querySelector('.tasks');
    w.tasks.forEach((tk,j)=>{
      const id=`w${w.w}-${j}`;
      const li=el(`<li class="${S.done[id]?'done':''}"><span class="box">${CHECK}</span><span class="t-text">${tk}</span></li>`);
      li.onclick=(e)=>{e.stopPropagation();S.done[id]=!S.done[id];save();render();};
      wul.appendChild(li);
    });
    map.appendChild(wk);
  });
  app.appendChild(mapSec);

  // ships
  const shSec=el(`<div class="section">
      <div class="s-head"><h2>COSA HO SPEDITO</h2><em>la prova che non molli</em></div>
      <div class="ship-add">
        <input id="sx" placeholder="Cosa hai spedito? (es. repo ai-90 online)">
        <input id="sl" placeholder="Link (facoltativo)">
        <button id="sadd">AGGIUNGI</button>
      </div>
      <div id="ships"></div>
    </div>`);
  const ships=shSec.querySelector('#ships');
  if(S.ships.length===0){ ships.appendChild(el(`<div class="empty">Ancora niente. Il primo ship \u00e8 il repo della Settimana 1. Spediscilo oggi.</div>`)); }
  else{
    [...S.ships].reverse().forEach(sp=>{
      ships.appendChild(el(`<div class="ship-item"><div class="sd num">${sp.date}</div>
        <div class="stext">${sp.text}</div>${sp.link?`<a href="${sp.link}" target="_blank" rel="noopener">${sp.link}</a>`:''}</div>`));
    });
  }
  const addShip=()=>{
    const tx=shSec.querySelector('#sx').value.trim();
    const lk=shSec.querySelector('#sl').value.trim();
    if(!tx) return;
    S.ships.push({text:tx,link:lk,date:todayStr()});save();render();
  };
  shSec.querySelector('#sadd').onclick=addShip;
  shSec.querySelector('#sx').addEventListener('keydown',e=>{if(e.key==='Enter')addShip();});
  app.appendChild(shSec);

  // why
  const why=el(`<div class="section"><div class="why">
      <div class="wl">IL PERCH\u00c9 \u2014 LEGGILO QUANDO NON HAI VOGLIA</div>
      <textarea id="why" rows="2" placeholder="Perch\u00e9 lo stai facendo?">${S.why||''}</textarea>
    </div></div>`);
  const ta=why.querySelector('#why');
  const autosize=()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';};
  ta.addEventListener('input',()=>{S.why=ta.value;autosize();});
  ta.addEventListener('blur',save);
  app.appendChild(why);
  setTimeout(autosize,0);

  app.appendChild(el(`<div class="footnote">Un giorno saltato non \u00e8 un fallimento. Mollare e non riaprire, quello s\u00ec. \u2014 costanza &gt; intensit\u00e0</div>`));
}

/* ---------- CONFETTI ---------- */
function burst(){
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const cf=document.getElementById('cf');
  const cols=['#1733FF','#0B0B0C','#1733FF','#ffffff','#1733FF'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div');
    c.className='conf';
    const x=50+(Math.random()*30-15);
    c.style.left=x+'%';c.style.top='42%';
    c.style.background=cols[i%cols.length];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    cf.appendChild(c);
    const dx=(Math.random()*2-1)*360, dy=-(180+Math.random()*260), rot=Math.random()*720-360;
    c.animate([{transform:c.style.transform,opacity:1},
      {transform:`translate(${dx}px,${dy}px) rotate(${rot}deg)`,opacity:1,offset:0.7},
      {transform:`translate(${dx*1.3}px,${dy+520}px) rotate(${rot*1.4}deg)`,opacity:0}],
      {duration:1100+Math.random()*700,easing:'cubic-bezier(.2,.7,.3,1)'}).onfinish=()=>c.remove();
  }
}

/* ---------- BOOT ---------- */
(function(){
  mem=!storageOK();
  S=load();
  if(!S){ S=fresh(); save(); }
  S.logged=S.logged||[];S.done=S.done||{};S.ships=S.ships||[];
  if(typeof S.streak!=='number')S.streak=0;if(typeof S.best!=='number')S.best=0;
  render();
})();
